<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HBnB - Explore Places</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="logo.png" alt="HBnB Logo" class="logo">
        <nav>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </nav>
    </header>

    <main>
        <h1>Places to Stay</h1>
        
        <section id="filters">
            <label for="price-filter">Max Price per Night:</label>
            <select id="price-filter">
                <option value="All">All Prices</option>
                <option value="10">$10 or less</option>
                <option value="50">$50 or less</option>
                <option value="100">$100 or less</option>
            </select>
        </section>

        <section id="places-list">
            </section>
    </main>

    <footer><p>All rights reserved © 2026 HBnB</p></footer>
    <script src="scripts.js"></script>
</body>
</html>
